<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Einfache Schlange: 5 Körpersegmente + Kopf, 1 Ebene -->
  <g data-layer="0">
    <!-- Kopf -->
    <circle id="feld-kopf" cx="235" cy="110" r="30"
      fill="#FFFFFF" stroke="#424242" stroke-width="3"/>
    <!-- Körpersegmente (S-Kurve) -->
    <ellipse id="feld-segment1" cx="185" cy="130" rx="32" ry="24"
      fill="#FFFFFF" stroke="#424242" stroke-width="3"/>
    <ellipse id="feld-segment2" cx="130" cy="160" rx="32" ry="24"
      fill="#FFFFFF" stroke="#424242" stroke-width="3"/>
    <ellipse id="feld-segment3" cx="85" cy="195" rx="30" ry="22"
      fill="#FFFFFF" stroke="#424242" stroke-width="3"/>
    <ellipse id="feld-segment4" cx="55" cy="240" rx="24" ry="17"
      fill="#FFFFFF" stroke="#424242" stroke-width="3"/>
  </g>
  <g data-layer="1">
    <!-- Auge (nur Linie) -->
    <circle id="linie-auge" cx="243" cy="102" r="5" fill="none" stroke="#424242" stroke-width="3"/>
    <!-- Zunge (nur Linie) -->
    <path id="linie-zunge" d="M262 118 L282 124 M282 124 L288 118 M282 124 L288 130"
      fill="none" stroke="#424242" stroke-width="3"/>
  </g>
</svg>
